<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diese Seite ist umgezogen — /tablet/ | Der Notenrechner</title>
  <meta name="description" content="Die /ipad/-Seite wurde durch /tablet/ ersetzt, die jetzt iPad und Android-Tablet abdeckt.">
  <meta http-equiv="refresh" content="0; url=/tablet/">
  <link rel="canonical" href="https://notenrechnerapp.de/tablet/">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <style>
    :root {
      --primary: #2F60C0; --primary-dark: #1F4A9C; --bg: #F7F6F3; --text: #0F0F10; --text-muted: #6E6E73;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); color: var(--text); background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; -webkit-font-smoothing: antialiased; }
    .redirect-card { max-width: 480px; text-align: center; padding: 48px 32px; background: #fff; border: 1px solid #E8E6E1; border-radius: 16px; box-shadow: 0 1px 2px rgba(15,15,16,0.04), 0 0 0 1px rgba(15,15,16,0.04); }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 12px; line-height: 1.3; }
    p { font-size: 15px; color: var(--text-muted); line-height: 1.65; margin-bottom: 24px; }
    a.cta { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; background: var(--primary); color: #fff; text-decoration: none; border-radius: 999px; font-size: 15px; font-weight: 600; transition: background 0.15s, transform 0.15s; }
    a.cta:hover { background: var(--primary-dark); transform: translateY(-1px); }
    a.cta::after { content: "›"; font-size: 18px; line-height: 1; }
  </style>
</head>
<body>
  <main class="redirect-card">
    <h1>Diese Seite ist umgezogen</h1>
    <p>Die iPad-Seite wurde durch eine breitere Tablet-Übersicht ersetzt, die jetzt auch Android-Tablets abdeckt. Sie werden automatisch weitergeleitet.</p>
    <a href="/tablet/" class="cta">Zur neuen Tablet-Seite</a>
  </main>
  <script>
    // Backup-Weiterleitung, falls meta refresh blockiert ist
    setTimeout(() => { if (location.pathname.includes('/ipad')) location.replace('/tablet/'); }, 100);
  </script>
</body>
</html>
